name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_API_LEVEL: "34"
      ANDROID_NDK_VERSION: "26.1.10909125"
      QT_VERSION: "6.7.2"
      PYSIDE_VERSION: "6.7.2"
      PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK & Build Tools
        run: |
          sdkmanager \
            "ndk;${{ env.ANDROID_NDK_VERSION }}" \
            "platforms;android-${{ env.ANDROID_API_LEVEL }}" \
            "build-tools;${{ env.ANDROID_API_LEVEL }}.0.0"

      - name: Cache Qt
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/Qt
          key: qt-${{ env.QT_VERSION }}-android-arm64

      - name: Install Qt for Android (arm64-v8a)
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_arm64_v8a
          dir: ${{ runner.temp }}/Qt
          modules: 'qtwebview'
          cache: true
          setup-python: false

      - name: Install Qt for Linux host (tools)
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          dir: ${{ runner.temp }}/Qt
          modules: 'qtwebview'
          cache: true
          setup-python: false

      - name: Install PySide6 and build dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "PySide6==${{ env.PYSIDE_VERSION }}" \
            "shiboken6==${{ env.PYSIDE_VERSION }}"

      - name: Read config.json
        id: config
        run: |
          echo "app_name=$(python3 -c "import json; c=json.load(open('config.json')); print(c['app_name'])")" >> $GITHUB_OUTPUT
          echo "package=$(python3 -c "import json; c=json.load(open('config.json')); print(c['package_name'])")" >> $GITHUB_OUTPUT
          echo "version=$(python3 -c "import json; c=json.load(open('config.json')); print(c['version'])")" >> $GITHUB_OUTPUT

      - name: Build APK with pyside6-android-deploy
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          QT_HOST_PATH: ${{ runner.temp }}/Qt/${{ env.QT_VERSION }}/gcc_64
          QT_ANDROID_PATH: ${{ runner.temp }}/Qt/${{ env.QT_VERSION }}/android_arm64_v8a
        run: |
          PYSIDE_WHEEL_DIR=$(pip show PySide6 | grep Location | awk '{print $2}')
          SHIBOKEN_WHEEL_DIR=$(pip show shiboken6 | grep Location | awk '{print $2}')

          pyside6-android-deploy \
            --name "${{ steps.config.outputs.app_name }}" \
            --wheel-pyside6 "${PYSIDE_WHEEL_DIR}" \
            --wheel-shiboken6 "${SHIBOKEN_WHEEL_DIR}" \
            --android-sdk "${ANDROID_SDK_ROOT}" \
            --android-ndk "${ANDROID_NDK_ROOT}" \
            --qt-android "${QT_ANDROID_PATH}" \
            --arch arm64-v8a \
            --verbose \
            main.py

      - name: Locate and rename APK
        id: apk
        run: |
          APK=$(find . -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Sign APK with debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=AppWrapper Debug, O=AppWrapper, C=DE"

          BUILD_TOOLS="${ANDROID_SDK_ROOT}/build-tools/${{ env.ANDROID_API_LEVEL }}.0.0"
          ${BUILD_TOOLS}/apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out appwrapper-signed.apk \
            ${{ steps.apk.outputs.path }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: appwrapper-apk-${{ github.sha }}
          path: appwrapper-signed.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: appwrapper-signed.apk
          name: "AppWrapper ${{ github.ref_name }}"
          body: |
            ## AppWrapper ${{ github.ref_name }}

            Android APK – automatisch gebaut via GitHub Actions.

            **Konfiguration:**
            - App: ${{ steps.config.outputs.app_name }}
            - Paket: ${{ steps.config.outputs.package }}
            - Version: ${{ steps.config.outputs.version }}

            **Installation:** APK herunterladen, auf Android-Gerät öffnen
            (Einstellungen → Installation unbekannter Apps erlauben).
