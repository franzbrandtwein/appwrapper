name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev \
            python3-pip python3-setuptools

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "buildozer>=1.5" "cython<3.0"

      - name: Generate buildozer.spec from config.json
        run: python3 generate_spec.py

      # Accept all Android SDK licenses and pre-install required packages
      # using the SDK that is already on the GitHub Actions runner
      - name: Accept Android SDK licenses & install build tools
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      # Install NDK via sdkmanager (runner SDK, avoids Buildozer's interactive prompt)
      - name: Install Android NDK 25.2
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          "$SDKMANAGER" "ndk;25.2.9519653"

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-global-${{ runner.os }}-

      - name: Cache Buildozer project directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'main.py') }}
          restore-keys: buildozer-project-${{ runner.os }}-

      - name: Build APK (debug)
        env:
          # Point Buildozer to the pre-installed (and licensed) SDK/NDK
          ANDROIDSDK: ${{ env.ANDROID_SDK_ROOT }}
          ANDROIDNDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
          ANDROIDAPI: "34"
          ANDROIDMINAPI: "24"
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          echo "=== Build finished ==="
          find . -name "*.apk" | head -5

      - name: Read app metadata
        id: config
        run: |
          echo "app_name=$(python3 -c "import json; c=json.load(open('config.json')); print(c['app_name'])")" >> $GITHUB_OUTPUT
          echo "version=$(python3 -c "import json; c=json.load(open('config.json')); print(c['version'])")" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: appwrapper-apk-${{ github.sha }}
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: build.log
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          name: "AppWrapper ${{ github.ref_name }}"
          body: |
            ## AppWrapper ${{ github.ref_name }}

            Android APK – automatisch gebaut via GitHub Actions / Buildozer.

            **Konfiguration:**
            - App: ${{ steps.config.outputs.app_name }}
            - Version: ${{ steps.config.outputs.version }}

            **Installation:** APK herunterladen → auf Android öffnen
            (Einstellungen → Unbekannte Apps → Installation erlauben).
