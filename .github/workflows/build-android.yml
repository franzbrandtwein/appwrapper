name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev \
            python3-pip python3-setuptools

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "buildozer>=1.5" "cython<3.0"

      - name: Generate buildozer.spec from config.json
        run: python3 generate_spec.py

      # Restore cache BEFORE license setup so our license files aren't overwritten
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-global-${{ runner.os }}-

      - name: Cache Buildozer project directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'main.py') }}
          restore-keys: buildozer-project-${{ runner.os }}-

      # AFTER cache restore: fix any corrupt/incomplete cached SDK and ensure
      # license files exist so Buildozer's old sdkmanager doesn't prompt.
      - name: Prepare Buildozer SDK directory and license files
        run: |
          SDK_DIR=~/.buildozer/android/platform/android-sdk

          # If the SDK directory exists but lacks sdkmanager, the cache holds a
          # partial install (e.g. only our pre-created licenses/ dir from a
          # previous failed run). Remove it so Buildozer re-downloads fresh.
          if [ -d "$SDK_DIR" ] && [ ! -f "$SDK_DIR/tools/bin/sdkmanager" ]; then
            echo "Incomplete SDK found at $SDK_DIR – removing for fresh download"
            rm -rf "$SDK_DIR"
          fi

          # Pre-create the licenses dir. When Buildozer downloads and unzips
          # commandlinetools, the zip only contains tools/ – it does NOT touch
          # licenses/, so our files survive the extraction intact.
          mkdir -p "$SDK_DIR/licenses"
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n' \
            > "$SDK_DIR/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n' \
            > "$SDK_DIR/licenses/android-sdk-preview-license"
          printf '\n33b6ADC7-D4-11d0-A37A-16FE-92B7-6D1F-B33C\n' \
            > "$SDK_DIR/licenses/intel-android-extra-license"
          echo "License files written to $SDK_DIR/licenses/"
          ls -la "$SDK_DIR/licenses/"
          echo "SDK dir state:"
          ls "$SDK_DIR/" 2>/dev/null || echo "(empty – fresh download will happen)"

      - name: Build APK (debug)
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          echo "=== Build finished ==="
          find . -name "*.apk" | head -5

      - name: Read app metadata
        id: config
        run: |
          echo "app_name=$(python3 -c "import json; c=json.load(open('config.json')); print(c['app_name'])")" >> $GITHUB_OUTPUT
          echo "version=$(python3 -c "import json; c=json.load(open('config.json')); print(c['version'])")" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: appwrapper-apk-${{ github.sha }}
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: build.log
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          name: "AppWrapper ${{ github.ref_name }}"
          body: |
            ## AppWrapper ${{ github.ref_name }}

            Android APK – automatisch gebaut via GitHub Actions / Buildozer.

            **Konfiguration:**
            - App: ${{ steps.config.outputs.app_name }}
            - Version: ${{ steps.config.outputs.version }}

            **Installation:** APK herunterladen → auf Android öffnen
            (Einstellungen → Unbekannte Apps → Installation erlauben).
